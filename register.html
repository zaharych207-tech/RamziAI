<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RamziAi - Регистрация</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .register-container {
      max-width: 450px;
      margin: 3rem auto;
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .register-title {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #2c3e50;
    }
    .register-footer {
      text-align: center;
      margin-top: 1.5rem;
    }
    .register-footer a {
      color: #e67e22;
      text-decoration: none;
    }
    .register-footer a:hover {
      text-decoration: underline;
    }
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper input {
      flex: 1;
      padding-right: 40px;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #777;
      padding: 5px;
    }
    .toggle-password:hover {
      color: #e67e22;
    }
    .checkbox-group {
      margin: 1rem 0;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #555;
    }
    .checkbox-label input[type="checkbox"] {
      width: auto;
      margin-right: 0.3rem;
      cursor: pointer;
    }
    .terms-link {
      color: #e67e22;
      text-decoration: none;
    }
    .terms-link:hover {
      text-decoration: underline;
    }
    .required-star {
      color: #e67e22;
      margin-left: 0.2rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-home">
      <a href="index.html">На главную</a>
    </div>
    <nav>
      <ul>
        <li><a href="recipes.html">Рецепты</a></li>
        <li><a href="ai.html">ИИ</a></li>
        <li><a href="support.html">Поддержка</a></li>
        <li><a href="login.html">Вход</a></li>
      </ul>
    </nav>
    <div class="profile-icon">
      <a href="account.html">Аккаунт</a>
    </div>
  </header>
  <main>
    <div class="register-container">
      <h2 class="register-title">Создать аккаунт</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Имя</label>
          <input type="text" id="name" placeholder="Ваше имя">
        </div>        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••">
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm">Подтвердите пароль</label>
          <div class="password-wrapper">
            <input type="password" id="confirm" placeholder="••••••••">
            <button type="button" class="toggle-password" onclick="togglePassword('confirm', this)">👁</button>
          </div>
        </div>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="newsletter">
            <span>Согласен получать новости и рассылку</span>
          </label>
        </div>
        
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="terms" required>
            <span>Согласен с <a href="#" class="terms-link">пользовательским соглашением</a><span class="required-star">*</span></span>
          </label>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem;">Зарегистрироваться</button>
      </form>
      <div class="register-footer">
        Уже есть аккаунт? <a href="login.html">Войти</a>
      </div>
    </div>
  </main>
  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      if (input.type === "password") {
        input.type = "text";
        button.textContent = "👁"; 
      } else {
        input.type = "password";
        button.textContent = "👁"; 
      }
    }
  </script>
</body>
</html>
