<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RamziAi - Вход</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 400px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .login-title {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #2c3e50;
      font-size: 1.5rem;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
    }
    .login-footer a {
      color: #e67e22;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .login-container {
        margin: 1rem;
        padding: 1.2rem;
      }
      .login-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-home">
      <a href="index.html">RamziAi</a>
    </div>
    <nav>
      <ul>
        <li><a href="recipes.html">Рецепты</a></li>
        <li><a href="ai.html">ИИ</a></li>
        <li><a href="support.html">Поддержка</a></li>
        <li><a href="login.html">Вход</a></li>
      </ul>
    </nav>
    <div class="profile-icon">
      <a href="account.html">👤</a>
    </div>
  </header>

  <main>
    <div class="login-container">
      <h2 class="login-title">Вход</h2>
      <form>
        <div class="form-group">
          <label for="username">Логин или email</label>
          <input type="text" id="username" placeholder="Введите логин">
        </div>
        <div class="form-group">
          <label for="password">Пароль</label>
          <input type="password" id="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Войти</button>
      </form>
      <div class="login-footer">
        Нет аккаунта? <a href="register.html">Создать аккаунт</a>
      </div>
    </div>
  </main>
</body>
</html>
