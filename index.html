<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>RamziAi - Добро пожаловать</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .welcome-container {
      text-align: center;
      margin-top: 1.5rem;
    }
    .welcome-title {
      font-size: 2.5rem;
      color: #e67e22;
      margin-bottom: 0.5rem;
    }
    .welcome-subtitle {
      font-size: 1rem;
      color: #555;
      margin-bottom: 2rem;
      padding: 0 1rem;
    }
    .nav-cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .nav-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.2rem;
      width: calc(50% - 0.5rem);
      min-width: 160px;
      max-width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.3s;
      text-decoration: none;
      color: #333;
    }
    .nav-card:hover {
      transform: translateY(-5px);
    }
    .nav-card span {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    .nav-card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }
    .nav-card p {
      color: #777;
      font-size: 0.8rem;
    }
    .welcome-footer {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .welcome-footer .btn {
      margin: 0;
    }

    @media (max-width: 480px) {
      .welcome-title {
        font-size: 2rem;
      }
      .nav-card {
        width: 100%;
        max-width: 280px;
      }
      .welcome-subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-home">
      <a href="index.html">RamziAi</a>
    </div>
    <nav>
      <ul>
        <li><a href="recipes.html">Рецепты</a></li>
        <li><a href="ai.html">ИИ</a></li>
        <li><a href="support.html">Поддержка</a></li>
        <li><a href="login.html">Вход</a></li>
      </ul>
    </nav>
    <div class="profile-icon">
      <a href="account.html">👤</a>
    </div>
  </header>

  <main>
    <div class="welcome-container">
      <h1 class="welcome-title">RamziAi</h1>
      <p class="welcome-subtitle">Кулинарное сообщество с искусственным интеллектом</p>

      <div class="nav-cards">
        <a href="recipes.html" class="nav-card">
          <h3>Рецепты</h3>
          <p>Смотрите рецепты других пользователей</p>
        </a>
        <a href="ai.html" class="nav-card">
          <h3>ИИ-помощник</h3>
          <p>Рецепт из ваших продуктов</p>
        </a>
        <a href="support.html" class="nav-card">
          <span>💬</span>
          <h3>Поддержка</h3>
          <p>Сообщите о проблеме</p>
        </a>
        <a href="login.html" class="nav-card">
          <h3>Вход</h3>
          <p>Войдите или зарегистрируйтесь</p>
        </a>
      </div>

      <div class="welcome-footer">
        <a href="login.html" class="btn">Войти</a>
        <a href="register.html" class="btn" style="background: #95a5a6;">Создать аккаунт</a>
      </div>
    </div>
  </main>
</body>
</html>
